id: donutsmp

title: "<black>Place items here to sell"

size: 54

sell-slots:
  - '0-53'


on_close:
  - check1:
      if: "%sell_pay% > 0"
      then:
        - '[sell_all]'
        - '[message] <white>Sold items for <red>$%sell_pay% <white>and earned <yellow>%sell_score% points'
        - '[sound] entity.player.levelup'
      else:
        - '[sound] block.dripstone_block.break'
        - '[message] <gray>Nothing to sell'

Items:
  counter:
    slot: 53
    display_name: "<white>Items worth: <gray>$%sell_pay_commas% <white>and <yellow>%sell_score_commas% <white>points"
    material: lime_stained_glass_pane
